<div
  class="resource-select cds--content-switcher cds--content-switcher--md cds--layout--size-md cds--layout-constraint--size__default-md cds--layout-constraint--size__min-sm cds--layout-constraint--size__max-lg overflow-x-auto"
  role="tablist"
>
  <button
    type="button"
    role="tab"
    tabindex="0"
    aria-selected="true"
    class="cds--content-switcher-btn cds--content-switcher--selected"
  >
    <span class="cds--content-switcher__label" title="{{tab_1_label}}">{{tab_1_label}}</span>
  </button>
  <button
    type="button"
    role="tab"
    tabindex="-1"
    aria-selected="false"
    class="cds--content-switcher-btn"
  >
    <span class="cds--content-switcher__label" title="{{tab_2_label}}">{{tab_2_label}}</span>
  </button>
  <button
    type="button"
    role="tab"
    tabindex="-1"
    aria-selected="false"
    class="cds--content-switcher-btn"
  >
    <span class="cds--content-switcher__label" title="{{tab_3_label}}">{{tab_3_label}}</span>
  </button>
  <!-- Repeat <button> for each additional tab -->
</div>
